name: Run AList with Cloudflared

on:
  workflow_dispatch: # Allows you to trigger the runner manually from the GitHub UI

jobs:
  run-alist:
    runs-on: ubuntu-latest
    steps:
      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@v2
        
      - name: Setup cloudflared tunnel
        uses: AnimMouse/setup-cloudflared/tunnel@v2
        with:
          url: http://localhost:8081
          
      - name: Start File Browser server
        run: |
          curl -fsSL https://raw.githubusercontent.com/filebrowser/get/master/get.sh | bash
          mkdir server
          # Running filebrowser in the background using '&'
          filebrowser --root ./server --port 8081 --address 0.0.0.0 --noauth --commands "wget,curl,yt-dlp,unzip,tar" & 
          
          # Give filebrowser a couple of seconds to spin up before starting the main sleep
          sleep 5 
          
          # Keeps the GitHub Action runner alive for 4 minutes
          sleep 240
        
      - name: Shutdown and view logs of cloudflared
        if: '! cancelled()'
        uses: AnimMouse/setup-cloudflared/shutdown@v2