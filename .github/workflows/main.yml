name: Run File Services with Cloudflared

permissions:
  contents: write

on:
  workflow_dispatch: # امکان اجرای دستی از تب Actions

jobs:
  run-builder:
    runs-on: ubuntu-latest
    
    steps:
      # ۱. دسترسی به فایل‌های ریپازیتوری (برای اجرای فایل پایتون)
      - name: Checkout repository code
        uses: actions/checkout@v4

      # ۲. نصب و تنظیم پایتون
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ۳. راه‌اندازی ابزار cloudflared
      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@v2
        
      # ۴. ساخت تونل برای File Browser (پورت 8081)
      - name: Setup cloudflared tunnel for File Browser
        uses: AnimMouse/setup-cloudflared/tunnel@v2
        with:
          url: http://localhost:8081
          
      # ۵. ساخت تونل برای اسکریپت پایتون یا سرویس دوم (پورت 8082)
      - name: Setup cloudflared tunnel for Python Service
        uses: AnimMouse/setup-cloudflared/tunnel@v2
        with:
          url: http://localhost:8082


      # ۶. نصب و اجرای File Browser در پس‌زمینه
      - name: Start File Browser server
        run: |
          curl -fsSL https://raw.githubusercontent.com/filebrowser/get/master/get.sh | bash
          mkdir -p server
          # استفاده از & در انتهای دستور برای اجرای بی‌صدا در پس‌زمینه
          filebrowser --root ./server --port 8081 --address 0.0.0.0 --noauth > filebrowser.log 2>&1 &
          # کمی صبر برای لود شدن کامل سرویس
          sleep 3
      - name: create Eula = True
        uses: 1arp/create-a-file-action@0.4.6
        with:
          path: 'server'
          isAbsolutePath: false
          file: 'eula.txt'
          content: eula=TRUE

      # ۷. اجرای فایل پایتون موجود در ریپو
      - name: Run File Fetcher Server
        run: |
          cd server
          python ../file_fetcher.py

      - name: Generate Workflow
        run: |
          mv ./server/config.json ./
          python workflow_generator.py
  
      - name: Commit and Push generated workflow
        run: |
          # 1. Configure Git with the GitHub Actions Bot credentials
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 2. Stage the newly created file
          git add .github/workflows/start_server.yml
          
          # 3. Commit only if there are actual changes (prevents workflow failure if nothing changed)
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-generate dynamic workflow [skip ci]"
            
            # 4. Push back to the current branch
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: compress With 7z
        uses: edgarrc/action-7z@v1
        with:
          args: 7z a server.7z server/

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: server.7z
          asset_name: server.7z
          tag: ${{ github.ref }}
          overwrite: true
          body: "This is game server folder"  
        
      # ۸. خاموش کردن تونل‌ها و نمایش لاگ‌ها در پایان کار (حتی در صورت خطا)
      - name: Shutdown and view logs of cloudflared
        if: ${{ !cancelled() }}
        uses: AnimMouse/setup-cloudflared/shutdown@v2