name: Run Server with Cloudflared

on:
  workflow_dispatch: # امکان اجرای دستی از تب Actions

jobs:
  run-server:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Get Server 7z pack from github release
        uses: robinraju/release-downloader@v1
        with:
          latest: true
          fileName: 'server.7z'

      - name: Extract server 7z
        uses: edgarrc/action-7z@v1
        with:
          args: 7z x server.7z

      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Start Cloudflared for game server
        run: |
          cloudflared tunnel --url tcp://localhost:25565 > cloudflarea.log 2>&1 &

          sleep 10

          cat cloudflare.log

      - name: Start Cloudflared for FileBrowser server
        run: |
          cloudflared tunnel --url http://localhost:8084 > cloudflareb.log 2>&1 &

          sleep 10

          cat cloudflare.log

      - name: Start Cloudflared for Minecraft server controller
        run: |
          cloudflared tunnel --url http://localhost:9000 > cloudflarec.log 2>&1 &

          sleep 15

          cat cloudflare.log

      - name: Start File Browser server
        run: |
          curl -fsSL https://raw.githubusercontent.com/filebrowser/get/master/get.sh | bash
          mkdir -p server
          
          filebrowser --root ./server --port 8084 --address 0.0.0.0 --noauth > filebrowser.log 2>&1 &
          
          sleep 3


      - name: Install java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '__JAVA_VER__'
      
      - name: Start Server
        run: |
          cd server
          python ../server_control.py 9000 java __JAVA_ARGS__ -jar __SERVER_JAR_NAME__ nogui

      - name: Delete Previous release
        uses: liudonghua123/delete-release-action@v1
        with:
          release_name: 'latest'

      - name: compress With 7z
        uses: edgarrc/action-7z@v1
        with:
          args: 7z a server.7z server/

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: server.7z
          asset_name: mything
          tag: ${{ github.ref }}
          overwrite: true
          body: "This is game server folder"  
        
      # ۸. خاموش کردن تونل‌ها و نمایش لاگ‌ها در پایان کار (حتی در صورت خطا)
      - name: Shutdown and view logs of cloudflared
        if: ${{ !cancelled() }}
        uses: AnimMouse/setup-cloudflared/shutdown@v2